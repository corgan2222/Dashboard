<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src 'self' ws://localhost:* http://localhost:*;">
  <title>IT Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dark">

<div id="app">

  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <nav id="sidebar">
    <div id="sidebar-logo" title="IT Dashboard">
      <img src="./assets/logo_inv.png" alt="IT Dashboard" width="36" height="36" style="object-fit:contain;">
    </div>

    <!-- Per-panel toggle buttons (dynamic) -->
    <div id="sidebar-panels"></div>

    <!-- Footer actions -->
    <div id="sidebar-footer">
      <button class="sidebar-btn" id="btn-manage-urls" title="Manage Panels">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <button class="sidebar-btn" id="btn-settings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
            a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65
            1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06
            A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65
            0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65
            1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0
            1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65
            0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51
            1z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ── Main panel area (Split.js renders here) ─────────────────── -->
  <div id="main-content"></div>

</div>

<!-- ── Settings Modal ──────────────────────────────────────────────── -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="modal-close" data-modal="settings-modal">×</button>
    </div>
    <div class="modal-body">

      <section class="settings-section">
        <h3>Panels</h3>
        <p class="help-text">Size and visibility are saved to config file.</p>
        <div id="settings-panels-list"></div>
      </section>

      <section class="settings-section">
        <h3>Layout</h3>
        <div class="toggle-row">
          <label for="toggle-disable-resize">Disable resize handles</label>
          <input type="checkbox" id="toggle-disable-resize">
        </div>
        <div class="toggle-row">
          <label for="toggle-columns-only">Columns only (no row splits)</label>
          <input type="checkbox" id="toggle-columns-only">
        </div>
        <div class="toggle-row">
          <label for="toggle-dark-mode">Dark mode</label>
          <input type="checkbox" id="toggle-dark-mode" checked>
        </div>
        <div class="toggle-row">
          <label for="toggle-sidebar-autohide">Auto-hide sidebar</label>
          <input type="checkbox" id="toggle-sidebar-autohide">
        </div>
      </section>

      <section class="settings-section">
        <h3>Custom CSS</h3>
        <p class="help-text">Injected into every webview after page load.</p>
        <textarea id="custom-css-input" rows="6"
          placeholder="/* e.g. footer { display:none !important; } */"></textarea>
        <div class="btn-row">
          <button id="btn-apply-css">Apply CSS</button>
          <button id="btn-toggle-default-css" class="btn-secondary">
            Default CSS: <span id="default-css-state">off</span>
          </button>
        </div>
      </section>

      <section class="settings-section">
        <button id="btn-reset-config" class="btn-danger">Reset to Default</button>
      </section>

    </div>
  </div>
</div>

<!-- ── Manage Panels Modal ──────────────────────────────────────────── -->
<div class="modal-overlay" id="urls-modal">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h2>Manage Panels</h2>
      <button class="modal-close" data-modal="urls-modal">×</button>
    </div>
    <div class="modal-body">

      <table id="url-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>URL</th>
            <th>Pos</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="url-table-body"></tbody>
      </table>

      <div class="add-panel-form">
        <h3>Add New Panel</h3>
        <div class="form-row">
          <input type="text" id="new-panel-name" placeholder="Name (e.g. Grafana)">
          <input type="text" id="new-panel-url"  placeholder="https://...">
          <select id="new-panel-col" title="Column (1–3)">
            <option value="1">Col 1</option>
            <option value="2">Col 2</option>
            <option value="3">Col 3</option>
          </select>
          <select id="new-panel-row" title="Row (1–2)">
            <option value="1">Row 1</option>
            <option value="2">Row 2</option>
          </select>
          <button id="btn-add-panel">Add</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="./node_modules/split.js/dist/split.min.js"></script>
<script src="renderer.js"></script>
</body>
</html>
